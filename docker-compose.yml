services:
  postgres:
    image: postgres:16
    container_name: chess_video_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chess_video
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chess_video"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: chess_video_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    container_name: chess_video_analyzer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/chess_video
      STOCKFISH_PATH: ${STOCKFISH_PATH:-/usr/games/stockfish}
      STOCKFISH_DEPTH: ${STOCKFISH_DEPTH:-14}
      ANALYZE_GAME_LIMIT: ${ANALYZE_GAME_LIMIT:-50}
    profiles:
      - analysis

volumes:
  postgres_data:
  minio_data:
